<body class="flex flex-col min-h-screen">
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-margin-mobile md:px-margin-desktop py-stack-lg relative overflow-hidden">
<!-- Background Aesthetic Elements -->
<div class="absolute inset-0 pointer-events-none opacity-20 overflow-hidden">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-container rounded-full blur-[120px]"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[20vw] font-black text-neutral-800 select-none opacity-10">
                SMSM
            </div>
</div>
<!-- Login Container -->
<div class="w-full max-w-[440px] z-10">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-stack-lg">
<div class="text-4xl md:text-5xl font-['Space_Grotesk'] font-black text-neutral-50 italic tracking-tighter uppercase mb-2">
                    SMSM STORE
                </div>
<div class="h-1 w-12 bg-primary-container"></div>
<p class="font-label-bold text-label-sm text-neutral-500 uppercase tracking-[0.3em] mt-4">Administrative Gateway</p>
</div>
<!-- Login Form Card -->
<div class="login-card p-8 md:p-10 shadow-2xl">
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-bold text-label-sm text-neutral-400 uppercase tracking-widest block" for="email">
                            EMAIL ADDRESS
                        </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-neutral-500 text-lg">
                                alternate_email
                            </span>
<input class="w-full bg-[#1A1A1A] border border-neutral-800 text-neutral-50 px-12 py-4 font-body-md rounded-none focus:outline-none focus:border-primary-container input-glow transition-all duration-300 placeholder:text-neutral-700" id="email" name="email" placeholder="admin@smsm.store" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-bold text-label-sm text-neutral-400 uppercase tracking-widest block" for="password">
                                ACCESS KEY
                            </label>
<a class="font-label-sm text-[10px] text-neutral-600 hover:text-primary-container transition-colors uppercase tracking-wider" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-neutral-500 text-lg">
                                lock
                            </span>
<input class="w-full bg-[#1A1A1A] border border-neutral-800 text-neutral-50 px-12 py-4 font-body-md rounded-none focus:outline-none focus:border-primary-container input-glow transition-all duration-300 placeholder:text-neutral-700" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-neutral-500 hover:text-neutral-300" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-primary-container text-neutral-50 font-label-bold text-label-bold py-5 rounded-none flex items-center justify-center gap-3 hover:bg-red-700 active:scale-[0.98] transition-all duration-200 group" type="submit">
<span>Login to Dashboard | دخول لوحة التحكم</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">
                                arrow_right_alt
                            </span>
</button>
</div>
<!-- Language / Help -->
<div class="flex items-center justify-between pt-6 border-t border-neutral-800/50">
<div class="flex gap-4">
<button class="text-neutral-500 hover:text-neutral-50 font-label-sm text-[11px] uppercase transition-colors" type="button">English</button>
<span class="text-neutral-800">|</span>
<button class="text-neutral-500 hover:text-neutral-50 font-label-sm text-[11px] transition-colors" type="button">العربية</button>
</div>
<div class="flex items-center gap-2 text-neutral-600">
<span class="material-symbols-outlined text-sm">verified_user</span>
<span class="font-label-sm text-[10px] uppercase tracking-tighter">SECURE SERVER 01</span>
</div>
</div>
</form>
</div>
<!-- Footer Text -->
<div class="mt-stack-md text-center">
<p class="font-['Space_Grotesk'] text-[10px] uppercase text-neutral-600 tracking-[0.2em]">
                    © 2024 SMSM STORE. ENGINEERED FOR THE ELITE.
                </p>
</div>

<div class="absolute inset-0 bg-primary-container/10 blur-[100px] rounded-full"></div>

</div>
